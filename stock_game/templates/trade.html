{% extends "base.html" %}
{% block title %}매수/매도{% endblock %}
{% block content %}
<h2>주식 거래</h2>
<form method="post">
    <label>종목 코드: <input type="text" name="symbol" required></label><br>
    <label>수량: <input type="number" name="quantity" required></label><br>
    <label>
        <input type="radio" name="action" value="buy" checked> 매수
        <input type="radio" name="action" value="sell"> 매도
    </label><br>
    <button type="submit">주문 실행</button>
</form>
{% endblock %}
